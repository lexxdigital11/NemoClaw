name: Setup Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-setup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test NVIDIA API import
      run: |
        python -c "
        try:
          from nvidia_ai_foundation_models import NVIDIAFoundationModelClient
          print('✅ NVIDIA AI Foundation Models import successful')
        except ImportError as e:
          print(f'❌ NVIDIA import failed: {e}')
          exit(1)
        "
        
    - name: Test Telegram bot import
      run: |
        python -c "
        try:
          from telegram import Update
          from telegram.ext import Application
          print('✅ Telegram bot imports successful')
        except ImportError as e:
          print(f'❌ Telegram import failed: {e}')
          exit(1)
        "
        
    - name: Test configuration loading
      run: |
        python -c "
        import os
        import yaml
        from pathlib import Path
        
        # Create test config
        test_config = {
          'agent_name': 'test_agent',
          'nvidia': {'api_key': 'test_key'},
          'telegram': {'bot_token': 'test_token'}
        }
        
        os.makedirs('~/.nemo_claw', exist_ok=True)
        with open('~/.nemo_claw/config.yaml', 'w') as f:
          yaml.dump(test_config, f)
        
        print('✅ Configuration test successful')
        "
        
    - name: Test main script syntax
      run: |
        python -m py_compile nemo_claw.py
        echo "✅ Main script syntax check passed"

  codespaces-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Verify Codespaces configuration
      run: |
        if [ ! -f ".devcontainer/devcontainer.json" ]; then
          echo "❌ devcontainer.json not found"
          exit(1)
        fi
        
        if [ ! -f "scripts/setup.sh" ]; then
          echo "❌ setup.sh not found"
          exit(1)
        fi
        
        echo "✅ Codespaces configuration verified"
        
    - name: Check setup script permissions
      run: |
        if [ ! -x "scripts/setup.sh" ]; then
          echo "❌ setup.sh is not executable"
          exit(1)
        fi
        
        echo "✅ Setup script permissions verified"